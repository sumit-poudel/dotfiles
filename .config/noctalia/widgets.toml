[[bar.mini.capsule_group]]
border = ""
fill = "surface_variant"
id = "g1"
members = ["launcher", "workspaces"]
opacity = 1.0
padding = 11.0
radius = 0

[[bar.mini.capsule_group]]
border = ""
fill = "surface_variant"
id = "g2"
members = ["temp", "cpu"]
opacity = 1.0
padding = 7.0
radius = 0

[[bar.mini.capsule_group]]
border = ""
fill = "surface_variant"
id = "g3"
members = ["network", "bluetooth", "volume"]
opacity = 1.0
padding = 7.0
radius = 0

[[bar.mini.capsule_group]]
border = ""
fill = "surface_variant"
id = "g4"
members = ["tray", "cat", "battery", "notifications"]
opacity = 1.0
padding = 7.0
radius = 0

[widget.workspaces]
display = "none"

[widget.cat]
audio_spectrum = true
tappy_mode = true
type = "noctalia/bongocat:cat"
scale = 0.9

[widget.battery]
display_mode = "graphic"
show_label = false
scale = 0.8

[widget.cpu]
display = "text"
show_label = false

[widget.temp]
display = "text"
show_label = false

[widget.tray]
drawer = true

[widget.clock]
capsule = true
format = "{:%-I:%M %p | %d %a}"

[widget.launcher]
glyph = "radioactive-filled"

[widget.media]
min_length = 150

[widget.network]
show_label = false

[widget.notifications]
color = "primary"

[widget.spacer_2]
type = "spacer"
