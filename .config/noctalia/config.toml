# =============================================================================
# 1. CORE SHELL & INTERFACE THEME
# =============================================================================

[shell]
avatar_path = "/home/sumit/Pictures/avtar.jpeg"
clipboard_history_max_entries = 20
font_family = "FiraCode Nerd Font Mono"
password_style = "random"
settings_show_advanced = true
telemetry_enabled = false
time_format = "{:%H:%M %a}"

[shell.panel]
launcher_categories = false
launcher_compact = true
transparency_mode = "glass"

[[shell.session.actions]]
action = "shutdown"
enabled = true
shortcut = "1"
variant = "destructive"

[[shell.session.actions]]
action = "reboot"
enabled = true
shortcut = "2"
variant = "default"

[[shell.session.actions]]
action = "logout"
enabled = true
shortcut = "3"
variant = "default"

[[shell.session.actions]]
action = "lock"
enabled = true
shortcut = "4"
variant = "default"

[[shell.session.actions]]
action = "suspend"
enabled = true
shortcut = "5"
variant = "default"

[theme]
community_palette = "Monochrome"
source = "community"

[theme.templates]
builtin_ids = [
  "alacritty",
  "btop",
  "cava",
  "gtk3",
  "gtk4",
  "kcolorscheme",
  "kitty",
  "niri",
  "qt",
  "starship",
]
community_ids = ["neovim", "obsidian", "vscode", "zed", "yazi"]

[wallpaper]
directory = "~/Pictures/Wallpapers"

[wallpaper.automation]
order = "alphabetical"

[wallpaper.default]
path = "/home/sumit/Pictures/Wallpapers/darkMountain.png"

[wallpaper.last]
path = "/home/sumit/Pictures/Wallpapers/darkMountain.png"

[wallpaper.monitors.HDMI-A-1]
path = "/home/sumit/Pictures/Wallpapers/darkMountain.png"

[wallpaper.monitors.eDP-1]
path = "/home/sumit/Pictures/Wallpapers/darkMountain.png"

[[wallpaper.favorite]]
community_palette = "Monochrome"
palette_source = "community"
path = "/home/sumit/Pictures/Wallpapers/1387138.png"
theme_mode = "light"

[[wallpaper.favorite]]
community_palette = "Monochrome"
palette_source = "community"
path = "/home/sumit/Pictures/Wallpapers/darkMountain.png"
theme_mode = "dark"

# =============================================================================
# 2. PANEL BAR & PANEL WIDGETS
# =============================================================================

[bar]
order = ["default"]

[bar.default]
background_opacity = 0.0
capsule_border = "primary"
capsule_padding = 7.0
font_weight = 700
margin_ends = 150
shadow = false
thickness = 25
scale = 0.90
widget_spacing = 10
end = ["group:g4", "group:g2"]
margin_edge = 0
start = ["group:g1", "group:g3"]

[[bar.default.capsule_group]]
border = "primary"
fill = "surface_variant"
id = "g1"
members = ["launcher", "workspaces"]
opacity = 1.0
padding = 11.0

[[bar.default.capsule_group]]
border = "primary"
fill = "surface_variant"
id = "g2"
members = ["tray", "bongocat", "battery", "notifications"]
opacity = 1.0
padding = 7.0

[[bar.default.capsule_group]]
border = "primary"
fill = "surface_variant"
id = "g3"
members = ["temp", "cpu"]
opacity = 1.0
padding = 7.0

[[bar.default.capsule_group]]
border = "primary"
fill = "surface_variant"
id = "g4"
members = ["network", "bluetooth", "volume"]
opacity = 1.0
padding = 7.0

[widget.bongocat]
audio_spectrum = true
capsule_padding = 10.0
scope = "shared"
script = "scripts/bongocat.lua"
input_device = "/dev/input/event2"
tappy_mode = true
type = "scripted"

[widget.battery]
display_mode = "graphic"
show_label = false

[widget.cpu]
display = "text"
show_label = false

[widget.temp]
display = "text"
show_label = false

[widget.tray]
drawer = false

[widget.clock]
capsule = true
format = "{:%-I:%M %p | %d %a}"

[widget.launcher]
glyph = "radioactive"

[widget.media]
min_length = 150

[widget.network]
show_label = false

[widget.notifications]
color = "primary"

[widget.spacer_2]
type = "spacer"

# =============================================================================
# 3. DESKTOP & LOCKSCREEN WIDGETS
# =============================================================================

[desktop_widgets]
enabled = false
schema_version = 1
widget_order = []

[desktop_widgets.grid]
cell_size = 16
major_interval = 4
visible = true

[lockscreen_widgets]
enabled = true
schema_version = 1
widget_order = [
  "lockscreen-login-box@eDP-1",
  "lockscreen-widget-0000000000000001",
  "lockscreen-widget-0000000000000002",
  "lockscreen-widget-0000000000000003",
  "lockscreen-widget-0000000000000004",
]

[lockscreen_widgets.grid]
