# =============================================================================
# 4. HARDWARE, ENVIRONMENT, & INPUT CONTROLS
# =============================================================================

[brightness]
enable_ddcutil = true

[control_center]
sidebar_section = "full"

[[control_center.shortcuts]]
type = "caffeine"

[[control_center.shortcuts]]
type = "notification"

[[control_center.shortcuts]]
type = "dark_mode"

[[control_center.shortcuts]]
type = "session"

[idle]
behavior_order = ["lock", "screen-off", "lock-and-suspend"]

[idle.behavior.lock]
action = "lock"
enabled = true
timeout = 600

[idle.behavior.lock-and-suspend]
action = "lock_and_suspend"
enabled = true
timeout = 900

[idle.behavior.screen-off]
action = "screen_off"
enabled = true
timeout = 660

[keybinds]
cancel = ["Escape"]
down = ["Ctrl+j"]
left = ["Ctrl+l"]
right = ["Ctrl+h"]
up = ["Ctrl+k"]
validate = ["Return"]

[location]
address = "chitwan,Nepal"

[nightlight]
enabled = true

[notification]
position = "bottom_right"

[osd]
position = "bottom_right"
